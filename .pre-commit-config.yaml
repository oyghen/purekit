repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Lint Python code with Ruff
        entry: uv run ruff check
        language: system
        types: [python]
        args: [--fix]

      - id: ruff-format
        name: Format Python code with Ruff
        entry: uv run ruff format
        language: system
        types: [python]
